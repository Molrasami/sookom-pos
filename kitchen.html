<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าจอห้องครัว - SOOKOM</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #2c3e50; margin: 0; padding: 20px; color: white; }
        h1 { text-align: center; color: #f1c40f; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #bdc3c7; font-size: 14px; margin-bottom: 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .order-card { background: #fff; color: #333; border-radius: 8px; padding: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); border-left: 5px solid #e74c3c; }
        .order-card.new-order { animation: highlight 2s ease-out; }
        @keyframes highlight { 0% { background-color: #fff3cd; } 100% { background-color: #fff; } }
        .order-header { display: flex; justify-content: space-between; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
        .order-header h2 { margin: 0; color: #e74c3c; font-size: 24px; }
        .order-time { color: #888; font-size: 14px; text-align: right; }
        .item-list { font-size: 18px; margin-bottom: 15px; }
        .item-row { display: flex; justify-content: space-between; margin-bottom: 5px; border-bottom: 1px dashed #ccc; padding-bottom: 5px;}
        .done-btn { width: 100%; background: #2ecc71; color: white; border: none; padding: 12px; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .done-btn:hover { background: #27ae60; }
        .no-orders { text-align: center; font-size: 20px; color: #bdc3c7; grid-column: 1 / -1; margin-top: 50px; }

        #startOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .start-btn { background: #f1c40f; color: #333; font-size: 24px; font-weight: bold; padding: 20px 40px; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 4px 15px rgba(241, 196, 15, 0.4); }
        .start-btn:hover { background: #f39c12; }
    </style>
</head>
<body>

    <div id="startOverlay">
        <button class="start-btn" onclick="startSystem()">เริ่มรับออเดอร์ห้องครัว (เปิดเสียง)</button>
    </div>

    <h1>👨‍🍳 จอรับออเดอร์ห้องครัว SOOKOM</h1>
    <div class="subtitle">ระบบจะอัปเดตอัตโนมัติทุกๆ 3 วินาที และมีเสียงเตือนเมื่อมีออเดอร์ใหม่</div>

    <div class="grid-container" id="orderGrid">
        <div class="no-orders">กำลังโหลดออเดอร์...</div>
    </div>

    <script>
        // แก้ไข IP ให้ตรงกับเครื่อง Mac ของคุณแล้วครับ
        const API_URL = "http://192.168.1.118:8000/api";
        let knownOrderIds = new Set();
        let isFirstLoad = true;
        let audioCtx = null;

        function playDingSound() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);

            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function startSystem() {
            document.getElementById('startOverlay').style.display = 'none';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            playDingSound(); // จะมีเสียง "ติ๊ง!" ดังขึ้น 1 ครั้งเพื่อเทสต์ระบบ
            fetchOrders();
            setInterval(fetchOrders, 3000);
        }

        async function fetchOrders() {
            try {
                const response = await fetch(`${API_URL}/kitchen/orders`);
                const result = await response.json();
                const orders = result.data;

                const currentOrderIds = orders.map(o => o.order_id);
                if (!isFirstLoad) {
                    const hasNewOrder = currentOrderIds.some(id => !knownOrderIds.has(id));
                    if (hasNewOrder) {
                        playDingSound();
                    }
                }

                knownOrderIds = new Set(currentOrderIds);
                isFirstLoad = false;

                renderOrders(orders);
            } catch (error) {
                console.error("Error fetching orders:", error);
            }
        }

        function renderOrders(orders) {
            const grid = document.getElementById('orderGrid');
            grid.innerHTML = '';

            if (orders.length === 0) {
                grid.innerHTML = '<div class="no-orders">🎉 ว่างแล้ว! ไม่มีออเดอร์ค้างครับ</div>';
                return;
            }

            orders.forEach(order => {
                let itemsHTML = '';
                order.items.forEach(item => {
                    itemsHTML += `<div class="item-row"><span>${item.name}</span> <span>x ${item.quantity}</span></div>`;
                });

                const timeStr = new Date(order.timestamp).toLocaleTimeString('th-TH');

                const cardHTML = `
                    <div class="order-card new-order">
                        <div class="order-header">
                            <h2>โต๊ะ ${order.table_number}</h2>
                            <span class="order-time">บิล #${order.order_id}<br>${timeStr}</span>
                        </div>
                        <div class="item-list">
                            ${itemsHTML}
                        </div>
                        <button class="done-btn" onclick="markAsDone(${order.order_id})">✅ ทำเสร็จแล้ว</button>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        async function markAsDone(orderId) {
            try {
                await fetch(`${API_URL}/kitchen/orders/${orderId}/complete`, { method: 'PUT' });
                knownOrderIds.delete(orderId);
                fetchOrders();
            } catch (error) {
                alert("เกิดข้อผิดพลาดในการอัปเดตสถานะ");
            }
        }
    </script>
</body>
</html>
